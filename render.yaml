# Render Blueprint Specification File
# =========================================================================
# This file automates the deployment of both the FastAPI Backend API 
# and the Vanilla static HTML/CSS/JS Frontend on Render.
#
# To deploy:
# 1. Push this project to GitHub.
# 2. Log in to Render.com.
# 3. Click "Blueprints" -> "New Blueprint Instance".
# 4. Connect your GitHub repository.
# 5. Render will build and link both services automatically!
# =========================================================================

services:
  # 1. Python FastAPI Backend Service
  - type: web
    name: retentashield-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
    # Specifies the subdirectory containing app.py and requirements.txt
    rootDir: backend

  # 2. Vanilla Static Frontend Site (Served via global CDN)
  - type: web
    name: retentashield-frontend
    env: static
    buildCommand: "" # Vanilla HTML/CSS/JS requires no build compilation
    publishDir: . # Serve files directly from the subdirectory root
    # Specifies the subdirectory containing index.html, style.css, script.js
    rootDir: frontend
